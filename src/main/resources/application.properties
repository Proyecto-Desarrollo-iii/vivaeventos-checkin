
spring.application.name=vivaeventos-checkin
app.version=0.1.0
app.api.version=v1

server.port=8086

spring.datasource.url=jdbc:postgresql://postgres:5432/vivaeventos_checkin
spring.datasource.username=devdb
spring.datasource.password=a1b2c3d4
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

jwt.secret=${JWT_SECRET:dGhpc0lzQVZlcnlTZWNyZXRLZXlGb3JWYWlhRXZlbnRvc1RoYXROZWVkczUw}
jwt.expiration=86400000

tickets.service.url=${TICKETS_SERVICE_URL:http://tickets:8085}
tickets.service.connect-timeout-ms=3000
tickets.service.read-timeout-ms=5000

resilience4j.circuitbreaker.instances.tickets.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.tickets.sliding-window-size=10
resilience4j.circuitbreaker.instances.tickets.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.tickets.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.tickets.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.tickets.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.tickets.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.tickets.record-exceptions=co.empresa.vivaeventos.checkin.domain.service.TicketsClientException,org.springframework.web.client.ResourceAccessException,java.io.IOException

resilience4j.retry.instances.tickets.max-attempts=2
resilience4j.retry.instances.tickets.wait-duration=300ms
resilience4j.retry.instances.tickets.retry-exceptions=co.empresa.vivaeventos.checkin.domain.service.TicketsClientException,org.springframework.web.client.ResourceAccessException

checkin.degraded-mode.enabled=true
checkin.pending-sync.retry-interval-ms=30000

management.server.port=8087
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=*

logging.level.root=ERROR
logging.level.web=INFO
logging.level.org.hibernate.SQL=DEBUG

spring.jackson.serialization.indent-output=true
